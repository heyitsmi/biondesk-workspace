<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Inquiry — Biondesk Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* Base styles and theme engine from app */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ul { list-style: none; }
  input, select, textarea { font: inherit; color: inherit; }

  :root {
    --bg: #F6F7F9; --surface: #FFFFFF; --surface-raised: #FFFFFF; --border: #E4E6EB;
    --text: #12161F; --text-muted: #6B7280; --accent: #C77F1F; --accent-text: #FFFFFF;
    --success: #1F8A5F; --danger: #D6383D;
    --accent-soft: rgba(199,127,31,0.1); --success-soft: rgba(31,138,95,0.1); --danger-soft: rgba(214,56,61,0.1);
    --shadow-raised: 0 4px 16px rgba(0,0,0,0.08);
    --font-display: 'Instrument Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
  }
  [data-theme="dark"] {
    --bg: #0B0E14; --surface: #12161F; --surface-raised: #1A1F2B; --border: #232838;
    --text: #EDEFF3; --text-muted: #8B93A6; --accent: #E8A33D; --accent-text: #12161F;
    --success: #34A87C; --danger: #E5484D;
    --accent-soft: rgba(232,163,61,0.12); --success-soft: rgba(52,168,124,0.12); --danger-soft: rgba(229,72,77,0.12);
    --shadow-raised: 0 8px 32px rgba(0,0,0,0.3);
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font-display); font-size: 14px; -webkit-font-smoothing: antialiased; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  
  .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .icon-sm { width: 15px; height: 15px; }

  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 11px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: opacity 0.12s ease, transform 0.1s ease; width: 100%; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: var(--accent-text); } .btn-primary:hover { opacity: 0.88; }
  
  /* Lead Form Layout */
  .form-container { width: 100%; max-width: 560px; }
  
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-raised); overflow: hidden; }
  
  .form-header { padding: 40px 40px 30px; text-align: center; border-bottom: 1px solid var(--border); background: var(--surface-raised); }
  .avatar { width: 64px; height: 64px; border-radius: 16px; background: var(--accent); color: var(--accent-text); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; margin: 0 auto 20px; }
  .form-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .form-header p { font-size: 14.5px; color: var(--text-muted); }
  
  .form-body { padding: 32px 40px 40px; }
  
  .field-group { margin-bottom: 24px; }
  .field-label { font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 8px; display: block; }
  .field-label span { color: var(--danger); margin-left: 2px; }
  
  .field-input, .field-select, .field-textarea { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; transition: border-color 0.15s ease, box-shadow 0.15s ease; outline: none; }
  .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field-textarea { resize: vertical; min-height: 100px; }
  
  .form-row { display: flex; gap: 16px; }
  .form-row .field-group { flex: 1; margin-bottom: 0; }
  .form-row-container { margin-bottom: 24px; }
  
  .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkbox-card { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); cursor: pointer; transition: border-color 0.15s ease; }
  .checkbox-card:hover { border-color: var(--text-muted); }
  .checkbox-card input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .checkbox-card span { font-size: 13.5px; font-weight: 500; }
  
  /* Selected state for radio/checkbox cards - requires JS to toggle class in a real app, 
     but we'll just style the native input for simplicity here */
  .checkbox-card:has(input:checked) { border-color: var(--accent); background: var(--accent-soft); }

  .watermark { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 24px; }
  .watermark a { color: var(--text); font-weight: 500; text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 3px; }

  @media (max-width: 600px) {
    .form-header { padding: 32px 24px 24px; }
    .form-body { padding: 24px 24px 32px; }
    .form-row { flex-direction: column; gap: 24px; }
    .checkbox-group { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="form-container">
  
  <div class="form-card">
    <div class="form-header">
      <div class="avatar">BS</div>
      <h1>Work with Biondesk Studio</h1>
      <p>Fill out the form below to tell us about your project, and we'll get back to you within 24 hours.</p>
    </div>
    
    <div class="form-body">
      <form onsubmit="event.preventDefault(); alert('Form submitted!');">
        
        <div class="form-row-container form-row">
          <div class="field-group">
            <label class="field-label">First Name <span>*</span></label>
            <input type="text" class="field-input" placeholder="Jane" required>
          </div>
          <div class="field-group">
            <label class="field-label">Last Name <span>*</span></label>
            <input type="text" class="field-input" placeholder="Doe" required>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Email Address <span>*</span></label>
          <input type="email" class="field-input" placeholder="jane@company.com" required>
        </div>
        
        <div class="field-group">
          <label class="field-label">Company / Organization</label>
          <input type="text" class="field-input" placeholder="Acme Corp">
        </div>

        <div class="field-group" style="margin-top: 32px; padding-top: 24px; border-top: 1px dashed var(--border);">
          <label class="field-label">What do you need help with? <span>*</span></label>
          <div class="checkbox-group">
            <label class="checkbox-card">
              <input type="checkbox" name="services" value="branding">
              <span>Brand Identity</span>
            </label>
            <label class="checkbox-card">
              <input type="checkbox" name="services" value="web">
              <span>Web Design</span>
            </label>
            <label class="checkbox-card">
              <input type="checkbox" name="services" value="app">
              <span>App Development</span>
            </label>
            <label class="checkbox-card">
              <input type="checkbox" name="services" value="marketing">
              <span>Marketing Strategy</span>
            </label>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Estimated Budget</label>
          <select class="field-select">
            <option value="" disabled selected>Select a range...</option>
            <option value="under5k">Under $5,000</option>
            <option value="5k_10k">$5,000 - $10,000</option>
            <option value="10k_25k">$10,000 - $25,000</option>
            <option value="over25k">$25,000+</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label">Project Details <span>*</span></label>
          <textarea class="field-textarea" placeholder="Tell us about your goals, timeline, and any specific requirements..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
          Send Inquiry
        </button>
      </form>
    </div>
  </div>

  <div class="watermark">
    Powered by <a href="#">Biondesk</a>
  </div>

</div>

<script>
(function() {
  // Apply theme based on URL parameter or fallback to dark
  const urlParams = new URLSearchParams(window.location.search);
  const theme = urlParams.get('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
</body>
</html>
