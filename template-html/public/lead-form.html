<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Inquiry — Biondesk Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme {
    --color-bg: #F6F7F9;
    --color-surface: #FFFFFF;
    --color-surface-raised: #FFFFFF;
    --color-border: #E4E6EB;
    --color-text: #12161F;
    --color-text-muted: #6B7280;
    --color-accent: #C77F1F;
    --color-accent-text: #FFFFFF;
    --color-success: #1F8A5F;
    --color-danger: #D6383D;
    --color-accent-soft: rgba(199,127,31,0.1);
    --color-success-soft: rgba(31,138,95,0.1);
    --color-danger-soft: rgba(214,56,61,0.1);
    --shadow-raised: 0 4px 16px rgba(0,0,0,0.08);
    --font-display: 'Instrument Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  [data-theme="dark"] {
    --color-bg: #0B0E14;
    --color-surface: #12161F;
    --color-surface-raised: #1A1F2B;
    --color-border: #232838;
    --color-text: #EDEFF3;
    --color-text-muted: #8B93A6;
    --color-accent: #E8A33D;
    --color-accent-text: #12161F;
    --color-success: #34A87C;
    --color-danger: #E5484D;
    --color-accent-soft: rgba(232,163,61,0.12);
    --color-success-soft: rgba(52,168,124,0.12);
    --color-danger-soft: rgba(229,72,77,0.12);
    --shadow-raised: 0 8px 32px rgba(0,0,0,0.3);
  }

  @layer base {
    body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-display); font-size: 14px; -webkit-font-smoothing: antialiased; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    a { color: inherit; text-decoration: none; }
    input, select, textarea { font: inherit; color: inherit; }
    * { scrollbar-width: thin; scrollbar-color: var(--color-border) transparent; }
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-text-muted); }
  }

  .checkbox-card:has(input:checked) {
    border-color: var(--color-accent) !important;
    background: var(--color-accent-soft) !important;
  }
</style>
</head>
<body>

<div class="w-full max-w-[560px]">

  <div class="overflow-hidden rounded-[16px] border border-border bg-surface shadow-raised">
    <div class="border-b border-border bg-surface-raised px-[40px] pt-[40px] pb-[30px] text-center max-[600px]:px-[24px] max-[600px]:pt-[32px] max-[600px]:pb-[24px]">
      <div class="mx-auto mb-[20px] flex h-[64px] w-[64px] items-center justify-center rounded-[16px] bg-accent text-[24px] font-bold text-accent-text">BS</div>
      <h1 class="mb-[8px] text-[24px] font-bold">Work with Biondesk Studio</h1>
      <p class="text-[14.5px] text-text-muted">Fill out the form below to tell us about your project, and we'll get back to you within 24 hours.</p>
    </div>

    <div class="px-[40px] pt-[32px] pb-[40px] max-[600px]:px-[24px] max-[600px]:pt-[24px] max-[600px]:pb-[32px]">
      <form onsubmit="event.preventDefault(); alert('Form submitted!');">

        <div class="mb-[24px] flex gap-[16px] max-[600px]:flex-col max-[600px]:gap-[24px]">
          <div class="flex-1">
            <label class="mb-[8px] block text-[12.5px] font-semibold text-text">First Name <span class="ml-[2px] text-danger">*</span></label>
            <input type="text" class="w-full rounded-[10px] border border-border bg-bg px-[14px] py-[12px] text-[14px] text-text outline-none [transition:border-color_0.15s_ease,box-shadow_0.15s_ease] focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]" placeholder="Jane" required>
          </div>
          <div class="flex-1">
            <label class="mb-[8px] block text-[12.5px] font-semibold text-text">Last Name <span class="ml-[2px] text-danger">*</span></label>
            <input type="text" class="w-full rounded-[10px] border border-border bg-bg px-[14px] py-[12px] text-[14px] text-text outline-none [transition:border-color_0.15s_ease,box-shadow_0.15s_ease] focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]" placeholder="Doe" required>
          </div>
        </div>

        <div class="mb-[24px]">
          <label class="mb-[8px] block text-[12.5px] font-semibold text-text">Email Address <span class="ml-[2px] text-danger">*</span></label>
          <input type="email" class="w-full rounded-[10px] border border-border bg-bg px-[14px] py-[12px] text-[14px] text-text outline-none [transition:border-color_0.15s_ease,box-shadow_0.15s_ease] focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]" placeholder="jane@company.com" required>
        </div>

        <div class="mb-[24px]">
          <label class="mb-[8px] block text-[12.5px] font-semibold text-text">Company / Organization</label>
          <input type="text" class="w-full rounded-[10px] border border-border bg-bg px-[14px] py-[12px] text-[14px] text-text outline-none [transition:border-color_0.15s_ease,box-shadow_0.15s_ease] focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]" placeholder="Acme Corp">
        </div>

        <div class="mt-[32px] border-t border-dashed border-border pt-[24px]">
          <label class="mb-[8px] block text-[12.5px] font-semibold text-text">What do you need help with? <span class="ml-[2px] text-danger">*</span></label>
          <div class="grid grid-cols-2 gap-[12px] max-[600px]:grid-cols-1">
            <label class="checkbox-card flex cursor-pointer items-center gap-[10px] rounded-[10px] border border-border bg-bg px-[14px] py-[12px] [transition:border-color_0.15s_ease] hover:border-text-muted">
              <input type="checkbox" name="services" value="branding" class="h-[16px] w-[16px] cursor-pointer accent-accent">
              <span class="text-[13.5px] font-medium">Brand Identity</span>
            </label>
            <label class="checkbox-card flex cursor-pointer items-center gap-[10px] rounded-[10px] border border-border bg-bg px-[14px] py-[12px] [transition:border-color_0.15s_ease] hover:border-text-muted">
              <input type="checkbox" name="services" value="web" class="h-[16px] w-[16px] cursor-pointer accent-accent">
              <span class="text-[13.5px] font-medium">Web Design</span>
            </label>
            <label class="checkbox-card flex cursor-pointer items-center gap-[10px] rounded-[10px] border border-border bg-bg px-[14px] py-[12px] [transition:border-color_0.15s_ease] hover:border-text-muted">
              <input type="checkbox" name="services" value="app" class="h-[16px] w-[16px] cursor-pointer accent-accent">
              <span class="text-[13.5px] font-medium">App Development</span>
            </label>
            <label class="checkbox-card flex cursor-pointer items-center gap-[10px] rounded-[10px] border border-border bg-bg px-[14px] py-[12px] [transition:border-color_0.15s_ease] hover:border-text-muted">
              <input type="checkbox" name="services" value="marketing" class="h-[16px] w-[16px] cursor-pointer accent-accent">
              <span class="text-[13.5px] font-medium">Marketing Strategy</span>
            </label>
          </div>
        </div>

        <div class="mb-[24px] mt-[24px]">
          <label class="mb-[8px] block text-[12.5px] font-semibold text-text">Estimated Budget</label>
          <select class="w-full rounded-[10px] border border-border bg-bg px-[14px] py-[12px] text-[14px] text-text outline-none [transition:border-color_0.15s_ease,box-shadow_0.15s_ease] focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]">
            <option value="" disabled selected>Select a range...</option>
            <option value="under5k">Under $5,000</option>
            <option value="5k_10k">$5,000 - $10,000</option>
            <option value="10k_25k">$10,000 - $25,000</option>
            <option value="over25k">$25,000+</option>
          </select>
        </div>

        <div class="mb-[24px]">
          <label class="mb-[8px] block text-[12.5px] font-semibold text-text">Project Details <span class="ml-[2px] text-danger">*</span></label>
          <textarea class="min-h-[100px] w-full resize-y rounded-[10px] border border-border bg-bg px-[14px] py-[12px] text-[14px] text-text outline-none [transition:border-color_0.15s_ease,box-shadow_0.15s_ease] focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]" placeholder="Tell us about your goals, timeline, and any specific requirements..." required></textarea>
        </div>

        <button type="submit" class="mt-[10px] inline-flex w-full items-center justify-center gap-[7px] rounded-[8px] px-[20px] py-[11px] text-[14px] font-semibold [transition:opacity_0.12s_ease,transform_0.1s_ease] active:scale-[0.97] bg-accent text-accent-text hover:opacity-[0.88]">
          Send Inquiry
        </button>
      </form>
    </div>
  </div>

  <div class="mt-[24px] text-center text-[12px] text-text-muted">
    Powered by <a href="#" class="font-medium text-text underline [text-decoration-color:var(--color-border)] [text-underline-offset:3px]">Biondesk</a>
  </div>

</div>

<script>
(function() {
  const urlParams = new URLSearchParams(window.location.search);
  const theme = urlParams.get('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
</body>
</html>
